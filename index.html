<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF7A90">
    <meta name="description" content="Track baby kicks and share with your partner">
    <title>Little Kicks Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #FFF5F7 0%, #F3EAF8 100%);
            --primary: #FF7A90;
            --primary-glow: rgba(255, 122, 144, 0.3);
            --secondary: #A38CF4;
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #2C2536;
            --text-muted: #8C8396;
            --border-radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 100px; /* Space for bottom nav */
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Smooth Glassmorphism Header */
        header {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 24px;
            border-radius: var(--border-radius);
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(163, 140, 244, 0.05);
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .sync-status::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .sync-status.online::before { background-color: #4CAF50; box-shadow: 0 0 8px #4CAF50; }
        .sync-status.offline::before { background-color: #FF9800; box-shadow: 0 0 8px #FF9800; }

        /* Premium Glass Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(44, 37, 54, 0.03);
            transition: transform 0.3s ease;
        }

        /* Bottom Floating Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 440px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 12px 40px rgba(44, 37, 54, 0.1);
            z-index: 1000;
        }

        .nav-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
            border-radius: 14px;
        }

        .nav-btn .icon {
            font-size: 20px;
        }

        .nav-btn.active {
            color: var(--primary);
            background: rgba(255, 122, 144, 0.08);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Giant Dynamic Pulse Button */
        .hero-kick-zone {
            text-align: center;
            padding: 10px 0;
        }

        .time-display {
            font-size: 40px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -1px;
            margin-bottom: 24px;
        }

        .kick-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #FF7A90 0%, #FF94B8 100%);
            color: white;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 12px 35px var(--primary-glow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
            position: relative;
        }

        .kick-button::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.15;
            z-index: -1;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .kick-button:active { transform: scale(0.94); }

        /* Elegant Form Elements */
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--text-main); }
        
        input[type="time"], input[type="date"], input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid rgba(44, 37, 54, 0.08);
            background: rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.2);
            transition: transform 0.2s;
        }
        .submit-btn:active { transform: scale(0.98); }

        /* Modern Dashboard Analytics Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: white;
            padding: 20px 16px;
            border-radius: var(--border-radius);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 4px 20px rgba(0,0,0,0.01);
        }
        .stat-number { font-size: 36px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .stat-label { color: var(--text-muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Sleek Timeline List */
        .timeline-item {
            background: white;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.01);
        }
        .timeline-item h4 { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .timeline-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
        .badge-role {
            display: inline-block;
            padding: 3px 8px;
            background: rgba(163, 140, 244, 0.1);
            color: var(--secondary);
            font-size: 10px;
            font-weight: 700;
            border-radius: 20px;
            margin-top: 6px;
        }

        .delete-btn {
            background: #FFEBEF;
            color: #FF4D6D;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #FF4D6D; color: white; }

        /* Toast Popup Notification Banner */
        .notification-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -100px);
            width: calc(100% - 40px);
            max-width: 400px;
            background: #2C2536;
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .notification-banner.show { transform: translate(-50%, 0); }

        .setup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--secondary) 0%, #8566F0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(163, 140, 244, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>👶 Little Kicks</h1>
            <p id="userRole">Loading perspective...</p>
            <div class="sync-status" id="syncStatus">Syncing...</div>
        </header>

        <div id="notificationBanner" class="notification-banner">ℹ️ Live notification area</div>

        <div id="record" class="tab-content active">
            <div class="glass-card hero-kick-zone">
                <div class="time-display" id="liveTime">00:00</div>
                <button class="kick-button" id="quickRecordBtn" onclick="recordKickQuick()">
                    <span style="font-size: 32px;">🦵</span>
                    <span>LOG KICK</span>
                </button>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 16px; font-size: 16px; font-weight: 800;">Manual Entry Log</h3>
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="kickDate">
                </div>
                <div class="input-group">
                    <label>Time</label>
                    <input type="time" id="kickTime">
                </div>
                <div class="input-group">
                    <label>Intensity</label>
                    <select id="kickIntensity">
                        <option value="1">Flutter / Light (1/5)</option>
                        <option value="2">Soft Roll (2/5)</option>
                        <option value="3" selected>Standard Kick (3/5)</option>
                        <option value="4">Strong Thump (4/5)</option>
                        <option value="5">Ninja Movement! (5/5)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Notes</label>
                    <input type="text" id="kickNotes" placeholder="Active after meals, hiccups etc.">
                </div>
                <button class="submit-btn" id="submitBtn" onclick="recordKick()">Save To Cloud</button>
            </div>
        </div>

        <div id="view" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="todayCount">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="weekCount">0</div>
                    <div class="stat-label">This Week</div>
                </div>
            </div>

            <div class="glass-card" style="padding: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <button onclick="previousDate()" style="border:none; background:none; font-size:18px; cursor:pointer;">◀️</button>
                    <span id="dateFilterDisplay" style="font-weight:700;">Today</span>
                    <button onclick="nextDate()" style="border:none; background:none; font-size:18px; cursor:pointer;">▶️</button>
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button class="submit-btn" style="background: var(--secondary); padding: 10px; font-size:12px;" onclick="setViewMode('day')" id="dayBtn">Daily</button>
                    <button class="submit-btn" style="background: var(--text-muted); padding: 10px; font-size:12px;" onclick="setViewMode('week')" id="weekBtn">Weekly</button>
                </div>
                <div id="kickListContainer"></div>
            </div>
        </div>

        <div id="setup" class="tab-content">
            <div class="glass-card">
                <h3 style="margin-bottom: 16px;">Profile Settings</h3>
                <div class="input-group">
                    <label>Mom's Name</label>
                    <input type="text" id="momName" value="Mom">
                </div>
                <div class="input-group">
                    <label>Dad's Name</label>
                    <input type="text" id="dadName" value="Dad">
                </div>
                <div class="input-group" id="roleDropdownContainer">
                    </div>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 16px;">Firebase Engine Configuration</h3>
                <div class="input-group"><label>API Key</label><input type="text" id="apiKey" placeholder="AIza..."></div>
                <div class="input-group"><label>Auth Domain</label><input type="text" id="authDomain" placeholder="project.firebaseapp.com"></div>
                <div class="input-group"><label>Database URL</label><input type="text" id="databaseURL" placeholder="https://..."></div>
                <div class="input-group"><label>Project ID</label><input type="text" id="projectId" placeholder="project-id"></div>
                <button class="setup-btn" onclick="setupFirebase()">Save Changes</button>
                <button class="setup-btn" style="background: #FF9800;" onclick="verifyConfig()">Verify Active Profile</button>
                <button class="setup-btn" style="background: #F44336;" onclick="clearFirebaseConfig()">Reset Configurations</button>
                <div id="configStatus" style="display:none; font-size:11px; margin-top:10px; word-break:break-all;"></div>
            </div>

            <div class="glass-card">
                <h3 style="margin-bottom: 12px;">System Permissions</h3>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="notificationToggle" style="width:20px; height:20px;" onchange="toggleNotifications()">
                    <span>Enable Push System Alerts</span>
                </label>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" id="nav-record" onclick="switchTab('record')">
            <span class="icon">📝</span><span>Record</span>
        </button>
        <button class="nav-btn" id="nav-view" onclick="switchTab('view')">
            <span class="icon">📊</span><span>Analytics</span>
        </button>
        <button class="nav-btn" id="nav-setup" onclick="switchTab('setup')">
            <span class="icon">⚙️</span><span>Settings</span>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // Physical Service Worker registration scoped to your GitHub Repo
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: '/Baby-Kick-Tracker/' })
                .then(reg => console.log('PWA Scope Matrix Registered:', reg.scope))
                .catch(err => console.log('SW Handshake Fault:', err));
            });
        }

        let db = null;
        let firebaseReady = false;
        let kicks = [];
        let currentViewMode = 'day';
        let currentFilterDate = new Date();
        let momName = localStorage.getItem('momName') || 'Mom';
        let dadName = localStorage.getItem('dadName') || 'Dad';
        let userRole = localStorage.getItem('userRole') || 'mom';

        function init() {
            injectRoleSelector();
            loadFirebaseConfig();
            loadLocalData();
            updateLiveTime();
            setTodayDate();
            displayStats();
            updateUserRole();
            updateSyncStatus();
            
            setInterval(updateLiveTime, 1000);
            setInterval(updateSyncStatus, 3000);
            
            document.getElementById('momName').value = momName;
            document.getElementById('dadName').value = dadName;
            document.getElementById('notificationToggle').checked = localStorage.getItem('notificationsEnabled') === 'true';
        }

        function injectRoleSelector() {
            const container = document.getElementById('roleDropdownContainer');
            if (container) {
                container.innerHTML = `
                    <label>Hardware View Device Perspective</label>
                    <select id="userRoleSelect" onchange="changeUserRole(this.value)">
                        <option value="mom">👩 Wife / Mother (Input Node)</option>
                        <option value="dad">👨 Husband / Father (Receiver Node)</option>
                    </select>
                `;
                document.getElementById('userRoleSelect').value = userRole;
            }
        }

        function changeUserRole(role) {
            userRole = role;
            localStorage.setItem('userRole', role);
            updateUserRole();
            showNotification(`Perspective switched to ${role === 'mom' ? 'Mother' : 'Father'}`);
        }

        function loadFirebaseConfig() {
            const stored = localStorage.getItem('firebaseConfig');
            if (stored) {
                try {
                    const config = JSON.parse(stored);
                    if (config.apiKey && config.databaseURL) {
                        initializeFirebase(config);
                        document.getElementById('apiKey').value = config.apiKey || '';
                        document.getElementById('authDomain').value = config.authDomain || '';
                        document.getElementById('databaseURL').value = config.databaseURL || '';
                        document.getElementById('projectId').value = config.projectId || '';
                    }
                } catch (e) { console.error(e); }
            }
        }

        function setupFirebase() {
            const config = {
                apiKey: document.getElementById('apiKey').value.trim(),
                authDomain: document.getElementById('authDomain').value.trim(),
                databaseURL: document.getElementById('databaseURL').value.trim(),
                projectId: document.getElementById('projectId').value.trim(),
                storageBucket: `${document.getElementById('projectId').value.trim()}.appspot.com`,
                messagingSenderId: "394342494768",
                appId: "1:394342494768:web:18076e93264a4a8cc633f5"
            };

            if (!config.apiKey || !config.databaseURL) {
                alert('Primary fields are required.');
                return;
            }
            localStorage.setItem('firebaseConfig', JSON.stringify(config));
            initializeFirebase(config);
            showNotification('✅ Database connected & synchronized.');
        }

        function initializeFirebase(config) {
            try {
                if (!firebase.apps.length) firebase.initializeApp(config);
                db = firebase.database();
                firebaseReady = true;
                listenForRemoteChanges();
            } catch (e) {
                firebaseReady = false;
            }
        }

        function updateSyncStatus() {
            const status = document.getElementById('syncStatus');
            if (!status) return;
            if (firebaseReady && navigator.onLine) {
                status.className = 'sync-status online';
                status.textContent = 'Live Synced';
            } else {
                status.className = 'sync-status offline';
                status.textContent = 'Offline Engine';
            }
        }

        function listenForRemoteChanges() {
            if (!db) return;
            db.ref('kicks').on('value', (snapshot) => {
                const remoteData = snapshot.val();
                if (!remoteData) {
                    kicks = [];
                    saveLocalData();
                    displayStats();
                    refreshKickList();
                    return;
                }
                const remoteArray = Object.values(remoteData);
                remoteArray.forEach(rk => {
                    if (!kicks.some(lk => lk.id === rk.id) && rk.recorder !== userRole) {
                        const sender = rk.recorder === 'mom' ? momName : dadName;
                        triggerSystemAlert(rk, sender);
                    }
                });
                kicks = remoteArray.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                saveLocalData();
                displayStats();
                refreshKickList();
            });
        }

        function triggerSystemAlert(kick, sender) {
            const msg = `👶 ${sender} just logged a kick at ${kick.time}!`;
            showNotification(msg);
            if (localStorage.getItem('notificationsEnabled') === 'true' && 'Notification' in window && Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification('Kick Detected!', { body: msg });
                });
            }
        }

        function recordKickQuick() {
            const now = new Date();
            const kick = {
                id: Date.now(),
                date: now.toISOString().split('T')[0],
                time: now.getHours().toString().padStart(2,0) + ':' + now.getMinutes().toString().padStart(2,0),
                intensity: 3,
                notes: 'Quick logged via Tap HUD',
                timestamp: now.getTime(),
                recorder: userRole
            };
            kicks.push(kick);
            saveLocalData();
            if (db) db.ref('kicks/' + kick.id).set(kick);
            showNotification('Kick tracked flawlessly.');
            displayStats();
            refreshKickList();
        }

        function recordKick() {
            const date = document.getElementById('kickDate').value;
            const time = document.getElementById('kickTime').value;
            const intensity = parseInt(document.getElementById('kickIntensity').value) || 3;
            const notes = document.getElementById('kickNotes').value;

            if(!date || !time) return alert('Fill required metrics');

            const kick = {
                id: Date.now(),
                date: date,
                time: time,
                intensity: intensity,
                notes: notes,
                timestamp: new Date(date + 'T' + time).getTime(),
                recorder: userRole
            };
            kicks.push(kick);
            saveLocalData();
            if(db) db.ref('kicks/' + kick.id).set(kick);
            
            document.getElementById('kickNotes').value = '';
            setTodayDate();
            showNotification('Entry pushed to matrix ledger.');
            displayStats();
            refreshKickList();
        }

        function saveLocalData() { localStorage.setItem('kicks', JSON.stringify(kicks)); }
        function loadLocalData() { const s = localStorage.getItem('kicks'); kicks = s ? JSON.parse(s) : []; }

        function displayStats() {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('todayCount').textContent = kicks.filter(k => k.date === todayStr).length;
            
            const wStart = new Date(); wStart.setDate(wStart.getDate() - wStart.getDay());
            document.getElementById('weekCount').textContent = kicks.filter(k => k.date >= wStart.toISOString().split('T')[0]).length;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');

            if(tabId === 'view') refreshKickList();
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            document.getElementById('dayBtn').style.background = mode === 'day' ? 'var(--secondary)' : 'var(--text-muted)';
            document.getElementById('weekBtn').style.background = mode === 'week' ? 'var(--secondary)' : 'var(--text-muted)';
            refreshKickList();
        }

        function previousDate() {
            currentFilterDate.setDate(currentFilterDate.getDate() - (currentViewMode === 'day' ? 1 : 7));
            refreshKickList();
        }
        function nextDate() {
            currentFilterDate.setDate(currentFilterDate.getDate() + (currentViewMode === 'day' ? 1 : 7));
            refreshKickList();
        }

        function refreshKickList() {
            const container = document.getElementById('kickListContainer');
            if(!container) return;

            const targetStr = currentFilterDate.toISOString().split('T')[0];
            document.getElementById('dateFilterDisplay').textContent = currentViewMode === 'day' ? targetStr : 'Weekly Window';

            let filtered = kicks;
            if(currentViewMode === 'day') {
                filtered = kicks.filter(k => k.date === targetStr);
            }

            if(filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted);">No entries found.</div>`;
                return;
            }

            container.innerHTML = filtered.map(k => `
                <div class="timeline-item">
                    <div class="timeline-info">
                        <h4>${k.time}</h4>
                        <p>Intensity level: ${k.intensity}/5 ${k.notes ? `• ${k.notes}` : ''}</p>
                        <span class="badge-role">${k.recorder === 'mom' ? momName : dadName}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteKick(${k.id})">✕</button>
                </div>
            `).join('');
        }

        function deleteKick(id) {
            if(confirm('Purge entry?')) {
                kicks = kicks.filter(k => k.id !== id);
                saveLocalData();
                if(db) db.ref('kicks/' + id).remove();
                displayStats();
                refreshKickList();
                showNotification('Entry purged.');
            }
        }

        function showNotification(msg) {
            const b = document.getElementById('notificationBanner');
            b.textContent = msg;
            b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 3500);
        }

        function toggleNotifications() {
            const active = document.getElementById('notificationToggle').checked;
            localStorage.setItem('notificationsEnabled', active);
            if (active && 'Notification' in window) Notification.requestPermission();
        }

        function setTodayDate() {
            const n = new Date();
            document.getElementById('kickDate').value = n.toISOString().split('T')[0];
            document.getElementById('kickTime').value = n.getHours().toString().padStart(2,0) + ':' + n.getMinutes().toString().padStart(2,0);
        }
        function updateLiveTime() {
            const n = new Date();
            document.getElementById('liveTime').textContent = n.getHours().toString().padStart(2,0) + ':' + n.getMinutes().toString().padStart(2,0);
        }
        function updateUserRole() {
            document.getElementById('userRole').textContent = `Active: ${userRole === 'mom' ? momName : dadName}`;
        }

        function verifyConfig() {
            const s = localStorage.getItem('firebaseConfig');
            const d = document.getElementById('configStatus');
            if(s) {
                d.style.display = 'block';
                d.innerHTML = `Loaded Struct Matrix: <br>${JSON.parse(s).databaseURL}`;
            }
        }
        function clearFirebaseConfig() {
            if(confirm('Clear localized schema configurations?')) {
                localStorage.removeItem('firebaseConfig');
                window.location.reload();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('momName').addEventListener('change', e => { momName = e.target.value; localStorage.setItem('momName', momName); updateUserRole(); });
            document.getElementById('dadName').addEventListener('change', e => { dadName = e.target.value; localStorage.setItem('dadName', dadName); updateUserRole(); });
            init();
        });
    </script>
</body>
</html>
